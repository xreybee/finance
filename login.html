<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk / Daftar - Finance</title>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- Floating animated bubbles background -->
  <div class="bubble-background">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <!-- A. SETUP FIREBASE SCREEN -->
  <div id="setup-screen" class="auth-wrapper" style="display: none;">
    <div class="auth-card glass-panel">
      <div class="auth-header">
        <div class="auth-logo"><i class="fa-solid fa-screwdriver-wrench"></i></div>
        <h2 class="auth-title">Konfigurasi Firebase</h2>
        <p class="auth-subtitle">Masukkan detail Web SDK Firebase Anda untuk memulai</p>
      </div>
      <form id="setup-form">
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input type="text" id="setup-api-key" class="form-control" placeholder="AIzaSy..." required>
        </div>
        <div class="form-group">
          <label class="form-label">Auth Domain</label>
          <input type="text" id="setup-auth-domain" class="form-control" placeholder="project-id.firebaseapp.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Project ID</label>
          <input type="text" id="setup-project-id" class="form-control" placeholder="project-id" required>
        </div>
        <div class="form-group">
          <label class="form-label">Storage Bucket</label>
          <input type="text" id="setup-storage-bucket" class="form-control" placeholder="project-id.appspot.com">
        </div>
        <div class="form-group">
          <label class="form-label">Messaging Sender ID</label>
          <input type="text" id="setup-sender-id" class="form-control" placeholder="315459011151">
        </div>
        <div class="form-group">
          <label class="form-label">App ID</label>
          <input type="text" id="setup-app-id" class="form-control" placeholder="1:12345:web:abcd">
        </div>
        <button type="submit" class="btn btn-aqua" style="width: 100%; margin-top: 10px;">
          <i class="fa-solid fa-floppy-disk"></i> Simpan & Hubungkan
        </button>
      </form>
    </div>
  </div>

  <!-- B. AUTHENTICATION SCREEN -->
  <div id="auth-screen" class="auth-wrapper" style="display: none;">
    <div class="auth-card glass-panel">
      <div class="auth-header">
        <div class="auth-logo"><i class="fa-solid fa-wallet"></i></div>
        <h2 class="auth-title" id="auth-form-title">Selamat Datang di Finance</h2>
        <p class="auth-subtitle" id="auth-form-subtitle">Kelola keuangan Anda dengan bijak dan modern</p>
      </div>
      
      <div id="auth-alert" class="alert-banner error" style="display: none;">
        <span class="alert-msg">Email atau password salah.</span>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-aqua" style="width: 100%; margin-top: 10px;">
          <i class="fa-solid fa-right-to-bracket"></i> Masuk
        </button>
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
          Belum punya akun? <a href="#" id="go-to-register" style="color: var(--aqua-color); text-decoration: none; font-weight: 600;">Daftar Sekarang</a>
        </p>
      </form>

      <!-- Register Form (Hidden by default) -->
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="register-name" class="form-control" placeholder="Masukkan nama Anda" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="register-email" class="form-control" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="register-password" class="form-control" placeholder="Minimal 6 karakter" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
          <i class="fa-solid fa-user-plus"></i> Daftar
        </button>
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
          Sudah punya akun? <a href="#" id="go-to-login" style="color: var(--aqua-color); text-decoration: none; font-weight: 600;">Masuk</a>
        </p>
      </form>
      
      <!-- Reset Firebase Config Option -->
      <div style="text-align: center; margin-top: 30px; border-top: 1px solid var(--white-glass-border); padding-top: 15px;">
        <a href="#" id="reset-firebase-config" style="font-size: 12px; color: var(--text-muted); text-decoration: none;">
          <i class="fa-solid fa-gear"></i> Ubah Konfigurasi Firebase
        </a>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  
  <script src="js/firebase-init.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
